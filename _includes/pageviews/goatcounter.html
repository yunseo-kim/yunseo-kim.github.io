<!-- Display GoatCounter pageviews -->
{% if site.analytics.goatcounter.domain -%}
  {%- assign goatcounter_host = site.analytics.goatcounter.domain -%}
{%- else -%}
  {%- assign goatcounter_host = site.analytics.goatcounter.id | append: ".goatcounter.com" -%}
{% endif %}
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const pv = document.getElementById('pageviews');

    if (pv !== null) {
      const uri = location.pathname.replace(/\/$/, '');
      const url = `https://{{ goatcounter_host }}/counter/${encodeURIComponent(uri)}.json`;

      fetch(url)
        .then((response) => response.json())
        .then((data) => {
          const count = data.count.replace(/\D/g, '');
          pv.innerText = new Intl.NumberFormat().format(Math.max(count, 1));
        })
        .catch((error) => {
          pv.innerText = '-';
        });
    }
  });
</script>
